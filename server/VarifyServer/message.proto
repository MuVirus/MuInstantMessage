syntax = "proto3";

package message;

service VarifyService {
    rpc GetVarifyCode (GetVarifyReq) returns (GetVarifyResp)  {}
}


message GetVarifyReq {
    string email = 1;
}

message GetVarifyResp {
    int32 error = 1;
    string email = 2;
    string code = 3;
}

message GetChatServerReq {
    int32 uid = 1;
}

message GetChatServerResp {
    int32 error = 1;
    string host = 2;
    string port = 3;
    string token = 4;
}

message LoginReq {
    int32 uid = 1;
    string token = 2;
}

message LoginResp {
    int32 error = 1;
    int32 uid = 2;
    string token = 3;
}

service StatusService {
    rpc GetChatServer (GetChatServerReq) returns (GetChatServerResp) {}
    rpc Login (LoginReq) returns (LoginResp) {}
}
